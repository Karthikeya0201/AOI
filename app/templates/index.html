<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IC Marking Verifier</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="container">
    <h1>IC Marking Verifier</h1>
    <form action="/inspect" method="post" enctype="multipart/form-data">
      <div class="field">
        <label>Part Number</label>
        <input name="part_number" placeholder="e.g., STM32F103C8T6" required />
      </div>
      <div class="field">
        <label>Preferred Marking URL (optional)</label>
        <input name="preferred_url" placeholder="Full URL to datasheet/marking doc" />
      </div>
      <div class="field">
        <label>IC Images (multiple allowed)</label>
        <input name="files" type="file" accept="image/*" multiple required />
      </div>
      <button type="submit">Inspect</button>
    </form>
  </div>
</body>
</html>
